# Set the prefix to ctrl+a
set -g prefix C-a
bind C-a send-prefix
unbind C-b

# 0 is too far from ` ;)
set -g base-index 1

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

set-option -g detach-on-destroy on

#set -g default-terminal screen-256color
set -g status-keys vi
set -g history-limit 10000

setw -g mode-keys vi
setw -g mouse on
setw -g monitor-activity on

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.

bind-key v split-window -h
bind-key s split-window -v

# Use shift arrows to resize panes
bind -n S-Down resize-pane -D 5
bind -n S-Up resize-pane -U 5
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5

# No delay for escape key press
set -sg escape-time 0

# Reload tmux config
bind r source-file ~/.config/tmux/tmux.conf

# THEME
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_default_text " #W "
set -g @catppuccin_window_current_text " #W "
set -g @catppuccin_window_current_fill "number"

set -g status-position top
set -g status-interval 5
set -g status-style bg=default
set -g pane-border-style fg=#313244
set -g pane-active-border-style fg=#313244
set -g pane-border-status top
set -g pane-border-format ""
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ""
set -g status-right ""

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

bind-key "t" display-popup -E -w 45% -h 65% -b none "sesh connect \"$(
 sesh list -i | fzf \
   --ansi \
   --height=100% \
   --border=rounded \
   --border-label=' Pick A Session ' \
   --prompt='⚡  ' \
   --pointer='▶' \
   --color='bg:#1e1e2e,bg+:#313244,fg:#cdd6f4,fg+:#cdd6f4,hl:#cba6f7,hl+:#cba6f7,border:#cba6f7,label:#cba6f7,prompt:#89b4fa,pointer:#a6e3a1,marker:#a6e3a1'
)\""

run '~/.tmux/plugins/tpm/tpm'
set -g status on
set -g status-style bg=default
set -g pane-border-style fg=#313244
set -g pane-active-border-style fg=#313244

set -g @col_session_active "#89b4fa"
set -g @col_window_active  "#a6e3a1"
set -g @col_inactive       "#45475a"
set -g @col_inactive_text  "#a6adc8"
set -g @col_text           "#1e1e2e"

set -g status-format[0] "#[align=left] #{S:#{?session_active,#[fg=#{@col_session_active} bg=default]#[bg=#{@col_session_active} fg=#{@col_text} bold] #{session_name} #[fg=#{@col_session_active} bg=default] ,#[fg=#{@col_inactive} bg=default]#[bg=#{@col_inactive} fg=#{@col_inactive_text}] #{session_name} #[fg=#{@col_inactive} bg=default] }}#[align=right]#{W:#[fg=#{@col_inactive} bg=default]#[bg=#{@col_inactive} fg=#{@col_inactive_text}] #I #W #[fg=#{@col_inactive} bg=default] ,#[fg=#{@col_window_active} bg=default]#[bg=#{@col_window_active} fg=#{@col_text} bold] #I #W #[fg=#{@col_window_active} bg=default] }"
set -g window-status-format ""
set -g window-status-current-format ""
